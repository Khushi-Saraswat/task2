<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login/Register</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="container">
    <h2 id="formTitle">Login</h2>
    <input type="text" id="username" placeholder="Username" />
    <input type="password" id="password" placeholder="Password" />
    <div id="emailField" style="display:none;">
      <input type="email" id="email" placeholder="Email (for registration)" />
    </div>
    <button onclick="handleSubmit()" id="submitBtn">Login</button>
    <button class="toggle" onclick="toggleForm()">Switch to Register</button>
    <div class="message" id="message"></div>
  </div>

  <script>
    let isLogin = true;

    function toggleForm() {
      isLogin = !isLogin;
      document.getElementById('formTitle').textContent = isLogin ? 'Login' : 'Register';
      document.getElementById('submitBtn').textContent = isLogin ? 'Login' : 'Register';
      document.getElementById('emailField').style.display = isLogin ? 'none' : 'block';
      document.getElementById('message').textContent = '';
    }

    async function handleSubmit() {
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;
      const email = document.getElementById('email').value;

      const endpoint = isLogin ? '/api/auth/signin' : '/api/auth/signup';
      const body = isLogin
        ? { username, password }
        : { username, password, email };

      const response = await fetch(endpoint, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });

      const result = await response.json();
      document.getElementById('message').textContent = result.message || JSON.stringify(result);
    }
  </script>
</body>
</html>
